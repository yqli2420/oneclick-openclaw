    <path d="M55,-100 C110,-165 195,-190 250,-150"/>
    <!-- Body -->
    <path d="M-55,-25 C-55,55 -38,130 0,170 C38,130 55,55 55,-25"/>
    <!-- Head -->
    <path d="M-55,-100 C-35,-125 35,-125 55,-100"/>
    <!-- Eyes -->
    <circle cx="-28" cy="-68" r="15" fill="#fff" stroke="none"/>
    <circle cx="28" cy="-68" r="15" fill="#fff" stroke="none"/>
    <circle cx="-28" cy="-68" r="8" fill="#dc2626" stroke="none"/>
    <circle cx="28" cy="-68" r="8" fill="#dc2626" stroke="none"/>
    <!-- Legs -->
